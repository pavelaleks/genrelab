# Пустой коммит каждые 10 часов, чтобы приложение на Streamlit Cloud не засыпало
name: Keep alive

on:
  schedule:
    # Каждые 10 часов (00:00, 10:00, 20:00 UTC)
    - cron: '0 */10 * * *'
  workflow_dispatch:  # Ручной запуск из вкладки Actions

permissions:
  contents: write   # Нужно для git push

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create empty commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive ping"
          git push
